services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Praneeth
      POSTGRES_DB: ai_crm_hcp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '8000:8000'
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:Praneeth@db:5432/ai_crm_hcp
      APP_ENV: production
      API_PREFIX: /api/v1
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL}
    volumes:
      - ./backend/uploads:/app/backend/uploads

volumes:
  postgres_data:
